name: Build adapter from reverse notes
prompt: >
  I have notes with page URL, API URL, request params, response samples, and
  failure codes. Turn them into a reusable adapter and runbook.
criteria:
  - "Creates adapter.yaml style structure with site, entry, routes, dependencies, protection, tests."
  - "Separates adapter metadata from crypto implementation and business services."
  - "Includes smoke, negative, and stability verification."
expect_skill: true
timeout: 120


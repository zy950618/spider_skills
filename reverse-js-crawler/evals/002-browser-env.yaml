name: Browser environment dependency
prompt: >
  The encryption function only runs in Chrome because it reads window, document,
  navigator, canvas, and localStorage. How should this be implemented?
criteria:
  - "Identifies browser environment dependencies explicitly."
  - "Prefers extracting official JS and running it in Node with patched environment when feasible."
  - "Allows browser diagnostics but does not make a user's real browser profile the production dependency."
  - "Requires comparing generated outputs with real request values."
expect_skill: true
timeout: 120


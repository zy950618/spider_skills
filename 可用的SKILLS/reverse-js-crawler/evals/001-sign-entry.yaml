name: Locate sign generation entry
prompt: >
  A target API request contains x-sign and timestamp. Restore the request.
criteria:
  - "Starts by locating the generation entry and initiator chain, not by guessing MD5/AES."
  - "Lists headers, cookies, body/query params, storage, and environment dependencies."
  - "Requires runtime evidence from js_reverse or an explicit fallback reason."
  - "Produces a runnable reproduction plan with test cases."
expect_skill: true
timeout: 120


name: Same website different markets
prompt: >
  The same airline website has CN, JP, US, and TH markets with different
  currencies and possibly different routes. How should the Skill avoid applying
  one market's result to all others?
criteria:
  - "Requires site memory to be keyed by domain plus market, locale, currency, stage, protection, and framework."
  - "Says same domain does not imply same route, Office ID, WAF, fare availability, or payment method."
  - "Requires market-matrix and route-decisions updates during testing."
  - "Requires checking existing site memory before implementing a same-domain task."
expect_skill: true
timeout: 120


name: Score site memory and test-log learning
prompt: >
  Score this crawler skills system after normal tests found market-specific
  failures. Check whether test logs became site memory, known failures,
  eval backlog, version changes, and drift tests.
criteria:
  - "Checks site memory exists for repeated domains."
  - "Requires market, locale, currency, stage, protection, and framework to be separated."
  - "Checks known-failures, test-log-lessons, market-matrix, route-decisions, eval-backlog, and change-log."
  - "Scores whether repeated failures became evals or reference updates."
  - "Does not require production incidents; normal test logs are enough."
expect_skill: true
timeout: 120


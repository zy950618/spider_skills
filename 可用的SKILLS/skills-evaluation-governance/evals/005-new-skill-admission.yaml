name: New Skill admission requires scoring and backtest
prompt: >
  I created a new crawler Skill and want to put it directly into 可用的SKILLS.
  What checks must run before it is accepted?
criteria:
  - "Requires SKILL.md, frontmatter, agents/openai.yaml, references, evals, and governance.md."
  - "Requires quick_validate and local score script."
  - "Requires at least one positive, one negative, and one historical regression or boundary eval."
  - "Requires updating the current score/backtest result document."
  - "Does not accept a new Skill only because the text looks useful."
expect_skill: true
timeout: 120


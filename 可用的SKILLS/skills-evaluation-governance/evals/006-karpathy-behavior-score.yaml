name: Score Karpathy-style behavior quality
prompt: >
  Evaluate a Skill that handles code and reverse-engineering tasks. It has many
  instructions but often guesses, over-scopes, and lacks verifiable success
  criteria. How should it be scored and improved?
criteria:
  - "Checks assumptions are surfaced rather than silently guessed."
  - "Checks scope is narrow and does not absorb adjacent tasks."
  - "Checks success criteria and verification loops exist."
  - "Penalizes bloated monolithic prompts and speculative flexibility."
  - "Keeps coding AGENT rules separate from task SKILLS."
expect_skill: true
timeout: 120

